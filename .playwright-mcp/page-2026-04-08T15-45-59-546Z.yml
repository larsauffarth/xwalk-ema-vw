            - list [ref=e900]:
              - listitem [ref=e901]:
                - term [ref=e902]: "1."
                - definition [ref=e903]:
                  - generic [ref=e904]: "Fahrzeugabbildung zeigt ggf. vom Angebot abweichende Sonderausstattung. Ein Angebot der Volkswagen Leasing GmbH, Gifhorner Str. 57, 38112 Braunschweig, für Privatkunden. Bonität vorausgesetzt. Gültig bis 30.06.2026. Leasingbeispiel für einen neuen Tiguan Life 1,5 l eTSI OPF 96 kW (131 PS) 7-Gang-Doppelkupplungsgetriebe DSG (Energieverbrauch kombiniert: 5,8 l/100 km; CO₂-Emissionen kombiniert: 133 g/km; CO₂-Klasse: D) bei jährlicher Fahrleistung 10.000 km: Leasing-Sonderzahlung 950,00 €, Laufzeit 48 Monate, 48 mtl. Leasingraten à 319,00 €. Nur bei teilnehmenden Volkswagen Partnern."
              - listitem [ref=e1111]:
                - term [ref=e1112]: "4."
                - definition [ref=e1113]:
                  - generic [ref=e1114]:
                    - text: Nur für Privatkunden. Die E‑Auto-Förderung gilt beim Kauf oder Leasing eines erstmals in Deutschland zugelassenen Neufahrzeugs der EU-Fahrzeugklasse M1 mit rein batterieelektrischem Antrieb, batterieelektrischem Antrieb mit Range-Extender oder Plug-in-Hybrid-Antrieb. Fahrzeuge mit Range-Extender oder Plug-in-Hybrid-Antrieb werden gefördert, sofern die Fahrzeuge bestimmte klimaschutzrelevante Anforderungen erfüllen.
                    - text: Weitere Informationen finden Sie auf der Seite des
                    - link "Bundesumweltministeriums" [ref=e1115] [cursor=pointer]:
                      - /url: https://www.bundesumweltministerium.de/foerderung/ueberblick-foerderung/fragen-und-antworten-zur-e-auto-foerderung
                      - generic [ref=e1116]: Bundesumweltministeriums
                    - text: .
              - listitem [ref=e911]:
                - term [ref=e912]: "6."
                - definition [ref=e913]:
                  - generic [ref=e914]: Angebot gilt nur für Privatkunden und deren Volkswagen Pkw bis Modelljahr 2022 und älter (ausgenommen FIN beginnend mit WV1, WV2, WV3, WV4 und WV5). Der Maximalrabatt beträgt 30 % ab dem 15. Fahrzeugjahr. Der Rabatt gilt auf unsere Preise für ausgewählte Volkswagen Original und HORUM® Teile, ausgeschlossen sind Schmier-/Betriebsstoffe und Lack.
              - listitem [ref=e915]:
                - term [ref=e916]: "7."
                - definition [ref=e917]:
                  - generic [ref=e918]:
                    - text: Ihr Vertrags- und Ansprechpartner ist die Volkswagen Deutschland GmbH & Co. KG (
                    - link "Impressum & Rechtliches" [ref=e919] [cursor=pointer]:
                      - /url: https://www.volkswagen.de/de/mehr/impressum1.html
                      - generic [ref=e920]: Impressum & Rechtliches
                    - text: )
              - listitem [ref=e921]:
                - term [ref=e922]: "8."
                - definition [ref=e923]:
                  - generic [ref=e924]: Ein Angebot der Volkswagen Bank GmbH, Gifhorner Str. 57, 38112 Braunschweig für Privatkunden. Bonität vorausgesetzt. Gültig bis 30.06.2026 für aktionsberechtigte Gebrauchtfahrzeuge. Finanzierungsbeispiel für einen ID.4 Pro 210kW (286PS) 77 kWh 1-Gang-Automatik, EZ 03/2025, 10.442 km, urspr. UVP des Herstellers 63.130,00 €, Fahrzeugpreis 39.374,18 €, Nettodarlehensbetrag 31.700,22 €, Anzahlung 7.673,96 €, Sollzinssatz (gebunden) p.a. 1,48 %, effektiver Jahreszins 1,49 %, Laufzeit 36 Monate, jährliche Fahrleistung 10.000 km, Gesamtbetrag 32.981,64 €, 36 mtl. Finanzierungsraten à 199,00 € und eine Schlussrate in Höhe von 25.817,64 €. Diese Angaben entsprechen zugleich dem repräsentativen Berechnungsbeispiel gemäß PAngV. Es besteht ein gesetzliches Widerrufsrecht für Verbraucher. Nur bei teilnehmenden Volkswagen Händlern.
            - list [ref=e927]:
              - listitem [ref=e928]:
                - term [ref=e929]
                - definition [ref=e930]:
                  - generic [ref=e931]:
                    - text: Die in dieser Darstellung gezeigten Fahrzeuge und Ausstattungen können in einzelnen Details vom aktuellen deutschen Lieferprogramm abweichen. Abgebildet sind teilweise Sonderausstattungen der Fahrzeuge gegen Mehrpreis.
                    - text: Bitte beachten Sie auch unseren Konfigurator für eine Übersicht der aktuell verfügbaren Modelle und Ausstattungen.
              - listitem [ref=e932]:
                - term [ref=e933]
                - definition [ref=e934]:
                  - generic [ref=e935]: Die angegebenen Verbrauchs- und Emissionswerte beziehen sich nicht auf ein einzelnes Fahrzeug und sind nicht Bestandteil des Angebots, sondern dienen allein Vergleichszwecken zwischen den verschiedenen Fahrzeugtypen. Zusatzausstattungen und Zubehör (Anbauteile, Reifenformat usw.) können relevante Fahrzeugparameter, wie z. B. Gewicht, Rollwiderstand und Aerodynamik verändern und neben Witterungs- und Verkehrsbedingungen sowie dem individuellen Fahrverhalten den Kraftstoffverbrauch, den Stromverbrauch, die CO₂-Emissionen und die Fahrleistungswerte eines Fahrzeugs beeinflussen.
