              - generic [ref=e36]:
                - heading "Bis zu 6.000 €⁠4 Zuschuss für neue Elektro- und Hybridfahrzeuge." [level=3] [ref=e37]
                - paragraph [ref=e38]: Rückwirkend zum 01. Januar 2026 fördert die Bundesregierung den Kauf und das Leasing von neuen Elektro- und Hybridfahrzeugen für Privatkunden. Holen Sie sich Ihren neuen Volkswagen ID. oder Plug-in-Hybrid und sichern Sie sich Fördersummen von bis zu 6.000 €⁠4.
