              - generic [ref=e44]:
                - heading "Anpfiff zum Gewinn. Jetzt Chance auf einen Volkswagen T‑Roc sichern." [level=3] [ref=e45]
                - paragraph [ref=e46]: "Bereit für Ihre größte Gewinnchance des Jahres? Zur Fußball-Weltmeisterschaft 2026 starten wir eine Gewinn-Offensive der Extraklasse und verlosen zahlreiche Preise: von signiertem DFB-Merchandise über begehrte Fußball-Tickets und außergewöhnliche Erlebnisreisen bis hin zu einem ganz besonderen Volltreffer – einem brandneuen Volkswagen T‑Roc. Jetzt mitspielen und vielleicht schon bald jubeln."
